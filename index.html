<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAU Email Signature Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #FFFFFF;
    --bg-secondary: #F5F5F5;
    --bg-input: #FAFAFA;
    --text-primary: #000000;
    --text-secondary: #6B6B6B;
    --border: #E5E5E5;
    --border-focus: #000000;
    --btn-bg: #000000;
    --btn-text: #FFFFFF;
    --accent-bg: #E9E5DA;
    --accent-border: #DBD5C8;
  }

  html.dark {
    --bg-primary: #1A1A1A;
    --bg-secondary: #2A2A2A;
    --bg-input: #222222;
    --text-primary: #E9E5DA;
    --text-secondary: #8A8780;
    --border: #333333;
    --border-focus: #E9E5DA;
    --btn-bg: #E9E5DA;
    --btn-text: #000000;
    --accent-bg: #2A2A2A;
    --accent-border: #3A3A3A;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-logo { height: 18px; width: auto; display: block; }
  .header-logo-dark { display: none; }
  .header-logo-light { display: block; }
  html.dark .header-logo-dark { display: block; }
  html.dark .header-logo-light { display: none; }
  .header-title { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 16px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 0;
    transition: border-color 0.2s, color 0.2s;
  }
  .theme-toggle:hover { border-color: var(--text-secondary); }

  .main { display: flex; min-height: calc(100vh - 77px); }
  .panel-form {
    width: 50%; padding: 40px 32px;
    border-right: 1px solid var(--border);
  }
  .panel-preview { width: 50%; padding: 40px 32px; }

  .field { margin-bottom: 24px; }
  .field label {
    display: block; text-transform: uppercase; font-size: 11px;
    letter-spacing: 0.1em; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500;
  }
  .field input {
    width: 100%; padding: 10px 12px; font-size: 14px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg-input); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 0; outline: none;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  .field input:focus { border-color: var(--border-focus); }
  .field input.invalid { border-bottom: 2px solid #D93025; }
  .field input::placeholder { color: var(--text-secondary); opacity: 0.6; }

  .input-addon {
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 14px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 0;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }

  .preview-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .preview-label {
    text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em;
    color: var(--text-secondary); font-weight: 500;
  }
  .preview-mode-toggle { display: flex; border: 1px solid var(--border); }
  .preview-mode-btn {
    padding: 5px 12px; font-size: 11px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
    background: none; color: var(--text-secondary); border: none; border-radius: 0; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .preview-mode-btn.active { background: var(--text-primary); color: var(--bg-primary); }

  .preview-frame {
    border: 1px solid var(--border); min-height: 180px; margin-bottom: 16px;
    transition: background 0.2s, border-color 0.2s;
  }
  .preview-frame.light-bg { background: #FFFFFF; }
  .preview-frame.dark-bg { background: #1A1A1A; }
  .preview-frame iframe { width: 100%; min-height: 180px; border: none; display: block; }

  .preview-note { font-size: 11px; color: var(--text-secondary); margin-bottom: 24px; }
  .btn-row { display: flex; gap: 12px; }
  .btn {
    padding: 10px 20px; font-size: 12px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 0; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .btn-secondary {
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { opacity: 1; border-color: var(--text-secondary); }
  .btn:hover { opacity: 0.85; }
  .btn.copied { opacity: 0.7; }

  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .panel-form, .panel-preview { width: 100%; border-right: none; }
    .panel-form { border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img class="header-logo header-logo-light" src="./images/TRAU_logo-positive.svg" alt="TRAU">
    <img class="header-logo header-logo-dark" src="./images/TRAU_logo-negative.svg" alt="TRAU">
    <span class="header-title">Email Signature Generator</span>
  </div>
  <button class="theme-toggle" id="themeToggle" title="Toggle app theme">&#9728;</button>
</div>

<div class="main">
  <div class="panel-form">
    <div class="field">
      <label for="f-name">Full Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Jan Novak" data-required="true">
    </div>
    <div class="field">
      <label for="f-title">Title *</label>
      <input type="text" id="f-title" placeholder="e.g. Master of the Universe" data-required="true">
    </div>
    <div class="field">
      <label for="f-email">Email *</label>
      <div style="display:flex;align-items:stretch;">
        <input type="text" id="f-email" placeholder="e.g. jan" data-required="true" style="border-right:none;">
        <span class="input-addon" style="border-left:none;">@trau.studio</span>
      </div>
    </div>
    <div class="field">
      <label for="f-phone">Phone *</label>
      <input type="tel" id="f-phone" placeholder="e.g. 420 721 617 992" data-required="true">
    </div>
    <div class="field">
      <label for="f-meeting">Book a Meeting URL</label>
      <div style="display:flex;align-items:stretch;">
        <span class="input-addon" style="border-right:none;">cal.com/</span>
        <input type="text" id="f-meeting" placeholder="e.g. jan/intro20min" style="border-left:none;">
      </div>
    </div>
  </div>

  <div class="panel-preview">
    <div class="preview-header">
      <span class="preview-label">Preview</span>
      <div class="preview-mode-toggle">
        <button class="preview-mode-btn active" id="btnLight" title="Light mode preview">&#9728;</button>
        <button class="preview-mode-btn" id="btnDark" title="Dark mode preview">&#9790;</button>
      </div>
    </div>
    <div class="preview-frame light-bg" id="previewFrame">
      <iframe id="previewIframe" title="Signature preview"></iframe>
    </div>
    <div class="preview-note">Test in Gmail and Outlook before deploying</div>
    <div class="btn-row">
      <button class="btn" id="btnCopyHtml">Copy HTML</button>
      <button class="btn btn-secondary" id="btnCopyText">Copy Plain Text</button>
    </div>
  </div>
</div>

<script>
// === STATE ===
var state = { name: '', title: '', email: '', phone: '', meetingUrl: '' };
var previewDark = false;

  document.documentElement.classList.toggle('dark', dark);
  themeBtn.innerHTML = dark ? '&#9728;' : '&#9790;';
  themeBtn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
}
themeBtn.addEventListener('click', function() {
  var isDark = document.documentElement.classList.contains('dark');
  setAppTheme(!isDark);
});

var logoLightB64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(logoLightSVG)));

// === PUBLIC LOGO URLs (for copied signature — Gmail needs real URLs, not base64) ===
var logoDarkUrl = 'https://raw.githubusercontent.com/jelinekon/trau-assets/main/TRAU_logo-positive.png';
var logoLightUrl = 'https://raw.githubusercontent.com/jelinekon/trau-assets/main/TRAU_logo-negative.png';

// === FONT STACK (matches reference: Inter with fallbacks) ===
var fontStack = "Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif";

// === SIGNATURE HTML (for copying — uses @media query for dark mode) ===
function getCleanSignatureHTML(s) {
  var meetingLine = '';
  if (s.meetingUrl && s.meetingUrl.trim() && fullMeetingUrl(s.meetingUrl)) {
    meetingLine =
      '<tr><td style="padding-top:20px;">' +
      '<a href="' + escapeHtml(fullMeetingUrl(s.meetingUrl)) + '" class="trau-sig-link" style="font-family:' + fontStack + ';font-size:12px;font-weight:700;color:#000000;text-decoration:none;letter-spacing:-0.14px;line-height:1.3;">\u2794 Book a meeting</a>' +
      '</td></tr>';
  }

  return '<style>@media (prefers-color-scheme: dark) {' +
    '.trau-sig-name { color: #FFFFFF !important; }' +
    '.trau-sig-text { color: #FFFFFF !important; }' +
    '.trau-sig-link { color: #FFFFFF !important; }' +
    '.trau-logo-light { display: block !important; }' +
    '.trau-logo-dark { display: none !important; }' +
    '}</style>' +
    '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:separate;">' +
    '<tr><td style="vertical-align:top;">' +
      '<p class="trau-sig-name" style="font-family:' + fontStack + ';font-size:14px;font-weight:700;color:#000000;margin:0;line-height:1.3;letter-spacing:-0.14px;">' + escapeHtml(s.name) + '</p>' +
      '<p class="trau-sig-text" style="font-family:' + fontStack + ';font-size:14px;font-weight:400;color:#000000;margin:0;line-height:1.3;letter-spacing:-0.14px;">' + escapeHtml(s.title) + '</p>' +
      '<p style="font-family:' + fontStack + ';font-size:14px;margin:0;line-height:1.3;">&nbsp;</p>' +
      '<p class="trau-sig-text" style="font-family:' + fontStack + ';font-size:14px;font-weight:400;color:#000000;margin:0;line-height:1.3;letter-spacing:-0.14px;"><a href="mailto:' + escapeHtml(fullEmail(s.email)) + '" class="trau-sig-text" style="color:#000000;text-decoration:none;">' + escapeHtml(fullEmail(s.email)) + '</a></p>' +
      '<p class="trau-sig-text" style="font-family:' + fontStack + ';font-size:14px;font-weight:400;color:#000000;margin:0;line-height:1.3;letter-spacing:-0.14px;"><a href="tel:' + escapeHtml(s.phone.replace(/\s/g, '')) + '" class="trau-sig-text" style="color:#000000;text-decoration:none;">' + escapeHtml(s.phone) + '</a></p>' +
    '</td></tr>' +
    '<tr><td style="padding-top:20px;">' +
      '<a href="https://trau.studio" target="_blank" style="text-decoration:none;">' +
      '<img class="trau-logo-dark" src="' + logoDarkUrl + '" width="173" alt="TRAU" style="display:block;width:173px;height:auto;border:0;" />' +
      '<img class="trau-logo-light" src="' + logoLightUrl + '" width="173" alt="TRAU" style="display:none;mso-hide:all;width:173px;height:auto;border:0;" />' +
      '</a>' +
    '</td></tr>' +
    meetingLine +
    '</table>';
}

// === RENDER PREVIEW HTML (forces light or dark explicitly, supports per-field opacity) ===
function renderPreviewHTML(s, dark, fieldOpacity) {
  var textColor = dark ? '#FFFFFF' : '#000000';
  var bgColor = dark ? '#1A1A1A' : '#FFFFFF';
  var logoSrc = dark ? logoLightB64 : logoDarkB64;
  var fo = fieldOpacity || {};
  function op(field) { return fo[field] !== undefined ? fo[field] : 1; }

  var meetingLine = '';
  if (s.meetingUrl && s.meetingUrl.trim() && fullMeetingUrl(s.meetingUrl)) {
    meetingLine =
      '<tr><td style="padding-top:20px;opacity:' + op('meetingUrl') + ';">' +
      '<a href="' + escapeHtml(fullMeetingUrl(s.meetingUrl)) + '" style="font-family:' + fontStack + ';font-size:12px;font-weight:700;color:' + textColor + ';text-decoration:none;letter-spacing:-0.14px;line-height:1.3;">\u2794 Book a meeting</a>' +
      '</td></tr>';
  }

  return '<!DOCTYPE html><html><head><meta charset="UTF-8"></head>' +
    '<body style="margin:0;padding:16px;background:' + bgColor + ';">' +
    '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:separate;">' +
    '<tr><td style="vertical-align:top;">' +
      '<p style="font-family:' + fontStack + ';font-size:14px;font-weight:700;color:' + textColor + ';margin:0;line-height:1.3;letter-spacing:-0.14px;opacity:' + op('name') + ';">' + escapeHtml(s.name) + '</p>' +
      '<p style="font-family:' + fontStack + ';font-size:14px;font-weight:400;color:' + textColor + ';margin:0;line-height:1.3;letter-spacing:-0.14px;opacity:' + op('title') + ';">' + escapeHtml(s.title) + '</p>' +
      '<p style="font-family:' + fontStack + ';font-size:14px;margin:0;line-height:1.3;">&nbsp;</p>' +
      '<p style="font-family:' + fontStack + ';font-size:14px;font-weight:400;color:' + textColor + ';margin:0;line-height:1.3;letter-spacing:-0.14px;opacity:' + op('email') + ';"><a href="mailto:' + escapeHtml(fullEmail(s.email)) + '" style="color:' + textColor + ';text-decoration:none;">' + escapeHtml(fullEmail(s.email)) + '</a></p>' +
      '<p style="font-family:' + fontStack + ';font-size:14px;font-weight:400;color:' + textColor + ';margin:0;line-height:1.3;letter-spacing:-0.14px;opacity:' + op('phone') + ';"><a href="tel:' + escapeHtml(s.phone.replace(/\s/g, '')) + '" style="color:' + textColor + ';text-decoration:none;">' + escapeHtml(s.phone) + '</a></p>' +
    '</td></tr>' +
    '<tr><td style="padding-top:20px;">' +
      '<a href="https://trau.studio" target="_blank" style="text-decoration:none;"><img src="' + logoSrc + '" width="173" alt="TRAU" style="display:block;width:173px;height:auto;border:0;" /></a>' +
    '</td></tr>' +
    meetingLine +
    '</table>' +
    '</body></html>';
}

// === RENDER PLAIN TEXT ===
function renderPlainText(s) {
  var lines = [s.name, s.title, '', fullEmail(s.email), s.phone];
  if (s.meetingUrl && s.meetingUrl.trim()) {
    lines.push('');
    lines.push('Book a meeting: ' + fullMeetingUrl(s.meetingUrl));
  }
  lines.push('');
  lines.push('trau.studio');
  return lines.join('\n');
}

// === HELPERS ===
function fullEmail(val) { return val ? val.trim() + '@trau.studio' : ''; }
function fullMeetingUrl(val) { return val && val.trim() ? 'https://cal.com/' + val.trim() : ''; }

function escapeHtml(str) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

// === LIVE PREVIEW ===
var iframe = document.getElementById('previewIframe');
var previewFrame = document.getElementById('previewFrame');

var placeholder = { name: 'Jan Novak', title: 'Master of the Universe', email: 'jan', phone: '+420 721 617 992', meetingUrl: '' };

function renderPreview() {
  var merged = {};
  var opacities = {};
  var fields = ['name', 'title', 'email', 'phone', 'meetingUrl'];
  for (var i = 0; i < fields.length; i++) {
    var f = fields[i];
    if (state[f] && state[f].trim()) {
      merged[f] = state[f];
      opacities[f] = 1;
    } else {
      merged[f] = placeholder[f];
      opacities[f] = 0.6;
    }
  }
  iframe.srcdoc = renderPreviewHTML(merged, previewDark, opacities);
  iframe.onload = function() {
    try {
      var h = iframe.contentDocument.body.scrollHeight;
      iframe.style.height = Math.max(h + 8, 180) + 'px';
    } catch(e) {}
  };
}

// === WIRE INPUTS ===
var inputs = {
  name: document.getElementById('f-name'),
  title: document.getElementById('f-title'),
  email: document.getElementById('f-email'),
  phone: document.getElementById('f-phone'),
  meetingUrl: document.getElementById('f-meeting')
};
// === PHONE FORMATTING ===
function formatPhone(val) {
  var digits = val.replace(/\D/g, '').substring(0, 12);
  if (!digits) return '+';
  var formatted = '+';
  for (var i = 0; i < digits.length; i++) {
    if (i > 0 && i % 3 === 0) formatted += ' ';
    formatted += digits[i];
  }
  return formatted;
}

Object.keys(inputs).forEach(function(key) {
  var el = inputs[key];
  el.addEventListener('input', function() {
    if (key === 'phone') {
      var cursor = el.selectionStart;
      var before = el.value;
      var formatted = formatPhone(before);
      if (formatted !== before) {
        var digitsBefore = before.substring(0, cursor).replace(/\s/g, '').length;
        el.value = formatted;
        var newPos = 0, count = 0;
        for (newPos = 0; newPos < formatted.length; newPos++) {
          if (formatted[newPos] !== ' ') count++;
          if (count === digitsBefore) { newPos++; break; }
        }
        el.setSelectionRange(newPos, newPos);
      }
      state[key] = formatted;
    } else {
      state[key] = el.value;
    }
    renderPreview();
  });
  if (el.dataset.required === 'true') {
    el.addEventListener('blur', function() {
      if (key === 'phone') {
        var digitCount = el.value.replace(/\D/g, '').length;
        el.classList.toggle('invalid', digitCount !== 12);
      } else {
        el.classList.toggle('invalid', el.value.trim() === '');
      }
    });
    el.addEventListener('input', function() {
      if (key === 'phone') {
        var digitCount = el.value.replace(/\D/g, '').length;
        if (digitCount === 12) el.classList.remove('invalid');
      } else {
        if (el.value.trim() !== '') el.classList.remove('invalid');
      }
    });
  }
  if (key === 'phone') {
    el.addEventListener('focus', function() {
      if (!el.value) { el.value = '+'; }
    });
    el.addEventListener('blur', function() {
      if (el.value === '+') { el.value = ''; state.phone = ''; renderPreview(); }
    });
  }
});

// === COPY BUTTONS ===
function showCopied(btn) {
  var orig = btn.textContent;
  btn.textContent = '\u2713 Copied!';
  btn.classList.add('copied');
  setTimeout(function() { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}

function copyHtmlAsRich(html, btn) {
  if (navigator.clipboard && navigator.clipboard.write && typeof ClipboardItem !== 'undefined') {
    var blob = new Blob([html], { type: 'text/html' });
    var item = new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([html], { type: 'text/plain' }) });
    navigator.clipboard.write([item]).then(function() { showCopied(btn); }).catch(function() { fbCopyHtml(html, btn); });
  } else {
    fbCopyHtml(html, btn);
  }
}

function fbCopyHtml(html, btn) {
  var listener = function(e) {
    e.clipboardData.setData('text/html', html);
    e.clipboardData.setData('text/plain', html);
    e.preventDefault();
  };
  document.addEventListener('copy', listener);
  document.execCommand('copy');
  document.removeEventListener('copy', listener);
  showCopied(btn);
}

function copyPlainText(text, btn) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showCopied(btn); }).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showCopied(btn); } catch(e) {}
      document.body.removeChild(ta);
    });
  }
}

document.getElementById('btnCopyHtml').addEventListener('click', function() {
  copyHtmlAsRich(getCleanSignatureHTML(state), this);
});
document.getElementById('btnCopyText').addEventListener('click', function() {
  copyPlainText(renderPlainText(state), this);
});

// === PREVIEW DARK/LIGHT TOGGLE ===
var btnLight = document.getElementById('btnLight');
var btnDark = document.getElementById('btnDark');

function setPreviewMode(dark) {
  previewDark = dark;
  previewFrame.className = 'preview-frame ' + (dark ? 'dark-bg' : 'light-bg');
  btnDark.classList.toggle('active', dark);
  btnLight.classList.toggle('active', !dark);
  renderPreview();
}

btnLight.addEventListener('click', function() { setPreviewMode(false); });
btnDark.addEventListener('click', function() { setPreviewMode(true); });

// === INIT ===
renderPreview();
</script>
